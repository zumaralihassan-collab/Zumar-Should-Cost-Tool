<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Should Cost AI — Procurement & Supply Chain Intelligence Suite | by Mohammed Zumar Ali Hassan</title>
<meta name="author" content="Mohammed Zumar Ali Hassan">
<meta name="description" content="AI-powered procurement should-cost calculator, executive dashboard, supply chain analytics and AI strategist — built by Mohammed Zumar Ali Hassan, MS Supply Chain Management, UT Dallas">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{ --brand:#0F766E; --brand-dark:#134E4A; --brand-light:#CCFBF1; --accent:#F59E0B; }
  body{ font-family:'Inter',system-ui,-apple-system,sans-serif; background:#F8FAFC; }
  .gradient-header{ background:linear-gradient(135deg,#0F766E 0%,#134E4A 60%,#1E3A8A 100%); }
  .card-shadow{ box-shadow:0 1px 3px rgba(15,23,42,.06),0 4px 12px rgba(15,23,42,.04); }
  .parameter-row:hover{ background:#F0FDFA; }
  details > summary { list-style:none; cursor:pointer; }
  details > summary::-webkit-details-marker { display:none; }
  .chevron{ transition:transform .2s; }
  details[open] .chevron{ transform:rotate(90deg); }
  input[type=number]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  input[type=number]{ -moz-appearance:textfield; }
  .tab-btn{ padding:.65rem 1.1rem; border-radius:.6rem; font-weight:600; font-size:.9rem; transition:all .15s; cursor:pointer; border:none; }
  .tab-active{ background:white; color:#0F766E; box-shadow:0 2px 6px rgba(15,118,110,.2); }
  .tab-inactive{ background:transparent; color:white; opacity:.85; }
  .tab-inactive:hover{ background:rgba(255,255,255,.15); opacity:1; }
  .ai-thinking{ background:linear-gradient(90deg,#14B8A6,#6366F1,#14B8A6); background-size:200% 100%;
    animation:shimmer 2s linear infinite; -webkit-background-clip:text; background-clip:text; color:transparent; }
  @keyframes shimmer{ 0%{background-position:0 0}100%{background-position:200% 0} }
  .pulse-dot{ animation:pulse 1.4s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1}50%{opacity:.3} }
  .watermark-fixed{ position:fixed; bottom:12px; right:18px; z-index:30; background:rgba(15,23,42,.85);
    color:#fff; padding:6px 14px; border-radius:999px; font-size:11px; font-weight:500; cursor:pointer;
    backdrop-filter:blur(6px); box-shadow:0 4px 14px rgba(15,23,42,.25); display:flex; align-items:center; gap:6px; }
  .watermark-fixed:hover{ background:#0F766E; }
  .kpi-card{ background:white; border-radius:1rem; padding:1.25rem; box-shadow:0 1px 3px rgba(15,23,42,.06),0 4px 12px rgba(15,23,42,.04); }
  .kpi-up{ color:#16A34A; }
  .kpi-down{ color:#DC2626; }
  .chat-bubble-user{ background:#0F766E; color:white; border-radius:18px 18px 4px 18px; padding:10px 14px; max-width:80%; align-self:flex-end; }
  .chat-bubble-bot{ background:white; border:1px solid #E2E8F0; border-radius:18px 18px 18px 4px; padding:10px 14px; max-width:90%; align-self:flex-start; }
  .quadrant-cell{ border:1px solid #E2E8F0; padding:14px; min-height:140px; position:relative; }
  .quadrant-strategic{ background:linear-gradient(135deg,#FEF3C7,#FDE68A); }
  .quadrant-leverage{ background:linear-gradient(135deg,#DBEAFE,#BFDBFE); }
  .quadrant-bottleneck{ background:linear-gradient(135deg,#FED7AA,#FDBA74); }
  .quadrant-routine{ background:linear-gradient(135deg,#D1FAE5,#A7F3D0); }
  .heat-cell{ padding:6px 4px; text-align:center; font-size:11px; color:white; font-weight:600; }
  @media print{ .no-print{ display:none !important; } .watermark-fixed{ position:static; background:#0F766E; } }
</style>
</head>
<body class="min-h-screen text-slate-800">
